name: Bug Report
description: Report a bug or unexpected behavior
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill out the sections below.
  - type: dropdown
    id: environment
    attributes:
      label: Environment
      description: Which terminal environment were you using?
      options:
        - Linux (bash)
        - macOS (zsh)
        - Windows (PowerShell)
        - N/A
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the bug clearly. What did you expect vs what actually happened?
      placeholder: "When I type `ls -la` in the terminal, I get..."
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce the issue?
      placeholder: |
        1. Go to /app
        2. Select Linux environment
        3. Type `ls -la`
        4. See error
    validations:
      required: true
  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: If applicable, add screenshots to help explain the problem.
    validations:
      required: false
  - type: input
    id: browser
    attributes:
      label: Browser & OS
      placeholder: "Chrome 124 on Windows 11"
    validations:
      required: false
