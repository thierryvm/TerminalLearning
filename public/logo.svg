<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <!-- Background rounded square -->
  <rect width="100" height="100" rx="22" fill="#0d1117"/>

  <!-- Subtle inner glow border -->
  <rect width="100" height="100" rx="22" stroke="#10b981" stroke-width="1.5" stroke-opacity="0.3"/>

  <!-- ">" chevron — terminal prompt -->
  <path
    d="M22 36 L40 50 L22 64"
    stroke="#10b981"
    stroke-width="7"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- "_" cursor — blinking underline -->
  <rect x="47" y="58" width="28" height="6" rx="3" fill="#10b981"/>
</svg>
